name: CI/CD Pipeline

on:
  push:
    branches: [ develop, main, master ]
  pull_request:
    branches: [ develop, main, master ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  CMAKE_VERSION: "3.28"

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }} - ${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows MSVC
          - os: windows-latest
            compiler: msvc
            cc: cl
            cxx: cl
          # Ubuntu GCC
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
          # Ubuntu Clang
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Cache Build Output
      uses: actions/cache@v4
      with:
        path: |
          build/
          vcpkg_installed/
        key: ${{ runner.os }}-${{ matrix.compiler }}-build-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.compiler }}-build-

    - name: Setup Dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          build-essential \
          libboost-all-dev \
          ${{ matrix.compiler == 'gcc' && 'gcc g++' || 'clang' }}

    - name: Setup Dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        # Boost should be available in the GitHub Actions Windows image
        if (-not (Test-Path "C:\local\boost_*")) {
          Write-Warning "Boost not found, attempting to use vcpkg"
          vcpkg install boost-asio:x64-windows
        }
      shell: pwsh

    - name: Configure CMake
      run: |
        cmake -B ${{github.workspace}}/build \
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
          -DCMAKE_C_COMPILER=${{ matrix.cc }} \
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
          -DMUD_ENABLE_TESTS=ON \
          -DMUD_ENABLE_STRICT_WARNINGS=ON
      env:
        CXX: ${{ matrix.cxx }}
        CC: ${{ matrix.cc }}

    - name: Build Project
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --parallel

    - name: Run Unit Tests
      if: runner.os == 'Linux'
      run: |
        cd ${{github.workspace}}/build
        ctest --output-on-failure --parallel 2 --build-config ${{env.BUILD_TYPE}}

    - name: Validate Server Startup
      if: runner.os == 'Linux'
      run: |
        # Test that server can start without crashing
        timeout 5s ${{github.workspace}}/build/mud_server 9999 || true
        echo "Server startup test passed"

    - name: Upload Build Artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-${{ matrix.compiler }}-binaries
        path: |
          build/mud_server
          build/mud_server.exe
          build/mud_client
          build/mud_client.exe
        retention-days: 7
        if-no-files-found: ignore

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential libboost-all-dev clang-tidy cppcheck

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Run Cppcheck (Static Analysis)
      continue-on-error: true
      run: |
        cppcheck --enable=all \
          --std=c++17 \
          --suppress=missingIncludeSystem \
          --suppress=unusedFunction \
          --error-exitcode=0 \
          --xml \
          src/ include/ 2> cppcheck-report.xml || true

    - name: Upload Static Analysis Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: static-analysis-report
        path: cppcheck-report.xml
        retention-days: 7
        if-no-files-found: ignore

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-and-test]
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential libboost-all-dev

    - name: Build Project
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --parallel

    - name: Start Server in Background
      run: |
        ./build/mud_server 9999 &
        SERVER_PID=$!
        echo "Server PID: $SERVER_PID"
        echo "$SERVER_PID" > server.pid
        sleep 2
        # Verify server is running
        if kill -0 $SERVER_PID 2>/dev/null; then
          echo "Server started successfully"
        else
          echo "Server failed to start"
          exit 1
        fi

    - name: Test Client Connection
      run: |
        # Simple connection test using bash TCP
        exec 3<>/dev/tcp/localhost/9999
        if [ $? -eq 0 ]; then
          echo "Client connection test: PASSED"
          exec 3>&-
        else
          echo "Client connection test: FAILED"
          exit 1
        fi

    - name: Cleanup
      if: always()
      run: |
        if [ -f server.pid ]; then
          kill $(cat server.pid) 2>/dev/null || true
          rm -f server.pid
        fi
        pkill -f mud_server || true

  deploy-dry-run:
    name: Deploy Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build-and-test, integration-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Validate Build Artifacts
      run: |
        echo "Deployment validation - all tests passed"
        echo "Build is ready for deployment"

    - name: Generate Build Report
      run: |
        echo "## Build Report" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Status:** ✅ All checks passed" >> $GITHUB_STEP_SUMMARY
        echo "- **Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
