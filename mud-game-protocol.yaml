openapi: 3.0.3

info:
  title: MUD游戏后端API协议
  description: 这是MUD游戏的统一接口契约，作为前后端开发的法定依据。
  version: 1.0.0
  contact:
    name: 你的名字

servers:
  - url: http://localhost:8080/api/v1
    description: 本地开发/Mock服务器

tags:
  - name: player
    description: 玩家相关接口
  - name: game
    description: 游戏核心交互接口
  - name: combat
    description: 战斗相关接口

components:
  schemas:
    # 统一的错误响应格式（PR评审要求）
    ErrorResponse:
      type: object
      required:
        - code
        - message
        - timestamp
      properties:
        code:
          type: string
          description: 业务错误码
          example: "PLAYER_NOT_FOUND"
        message:
          type: string
          description: 错误描述
          example: "玩家不存在"
        details:
          type: string
          description: 详细错误信息
          example: "玩家ID 10086 不存在"
        timestamp:
          type: integer
          format: int64
          description: 错误时间戳
          example: 1713158400000

    # 玩家信息对象
    Player:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 玩家唯一ID
          example: 10086
        name:
          type: string
          description: 玩家昵称
          example: "勇敢的冒险者"
        level:
          type: integer
          description: 等级
          example: 5
        hp:
          type: integer
          description: 当前生命值
          example: 80
        maxHp:
          type: integer
          description: 最大生命值
          example: 100
        exp:
          type: integer
          description: 当前经验值
          example: 250

    # 战斗结果对象
    CombatResult:
      type: object
      properties:
        victory:
          type: boolean
          description: 是否击败怪物
          example: false
        damageDealt:
          type: integer
          description: 造成的伤害
          example: 25
        damageReceived:
          type: integer
          description: 受到的伤害
          example: 10
        expGained:
          type: integer
          description: 获得的经验值
          example: 30
        loot:
          type: string
          description: 掉落的物品
          example: "铁剑"

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

paths:
  # 获取玩家信息
  /player/{playerId}:
    get:
      tags:
        - player
      summary: 获取玩家基本信息
      operationId: getPlayerById
      parameters:
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 10086
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "404":
          $ref: "#/components/responses/NotFound"

  # 执行游戏指令
  /game/command:
    post:
      tags:
        - game
      summary: 执行游戏指令
      operationId: executeCommand
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - command
                - playerId
              properties:
                command:
                  type: string
                  description: 玩家输入的指令
                  example: "look"
                playerId:
                  type: integer
                  format: int64
                  example: 10086
      responses:
        "200":
          description: 指令执行成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "你站在一个古老的广场上"
                  playerUpdate:
                    $ref: "#/components/schemas/Player"
        "400":
          $ref: "#/components/responses/BadRequest"

  # 攻击怪物
  /combat/attack:
    post:
      tags:
        - combat
      summary: 攻击怪物
      operationId: attackMonster
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - playerId
                - monsterId
              properties:
                playerId:
                  type: integer
                  format: int64
                  example: 10086
                monsterId:
                  type: integer
                  format: int64
                  example: 1
      responses:
        "200":
          description: 攻击成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CombatResult"
        "400":
          $ref: "#/components/responses/BadRequest"